name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx jest --passWithNoTests --ci --forceExit --no-coverage
      - name: Lint
        run: npx expo lint 2>/dev/null || true

  build-web:
    runs-on: [self-hosted, linux, x64]
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Export web build
        run: npx expo export --platform web --output-dir dist
      - name: Upload web build
        # Artifact storage is billing-blocked account-wide (2026-07); the
        # build itself is the CI signal. Upload resumes working (and this
        # stops soft-failing) once billing is settled.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: web-build
          path: dist/

  build-native:
    runs-on: [self-hosted, linux, x64]
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build (Android preview)
        run: eas build --platform android --profile preview --non-interactive
